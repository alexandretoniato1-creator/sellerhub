<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas — SellerHub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --border: #E8E4DC;
  --border-soft: #F0EDE6;
  --text: #1A1916;
  --text-2: #5C5A54;
  --text-3: #9C9A94;
  --accent: #D85A30;
  --accent-light: #F5C4B3;
  --accent-bg: #FAECE7;
  --green: #2D6A4F;
  --green-bg: #E8F5EE;
  --blue: #1E4F8C;
  --blue-bg: #E8F0FB;
  --amber: #854F0B;
  --amber-bg: #FAEEDA;
  --purple: #5B3A8C;
  --purple-bg: #F0EBF8;
  --toolbar-h: 52px;
  --sidebar-w: 260px;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --serif: 'Lora', serif;
  --r: 8px;
  --r-sm: 5px;
  --shadow: 0 2px 12px rgba(26,25,22,0.08);
  --shadow-lg: 0 8px 32px rgba(26,25,22,0.12);
  --t: 0.18s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family: var(--sans); background: var(--bg); color: var(--text); }

/* ── TOOLBAR ── */
.toolbar {
  position: fixed; top:0; left:0; right:0; height: var(--toolbar-h);
  background: var(--text); z-index:200;
  display: flex; align-items: center; gap: 0; padding: 0 16px;
  border-bottom: 1px solid #333;
}
.toolbar-logo {
  font-family: var(--sans); font-size:14px; font-weight:600;
  color: #fff; letter-spacing:-.3px; margin-right:20px; white-space:nowrap;
}
.toolbar-logo span { color: var(--accent); }
.toolbar-sessao {
  font-family: var(--mono); font-size:11px; color:#888; 
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px;
}
.toolbar-sep { width:1px; height:24px; background:#333; margin:0 12px; flex-shrink:0; }

/* Bloco type buttons */
.tool-group { display:flex; gap:3px; }
.tool-btn {
  display:flex; align-items:center; gap:6px;
  padding: 5px 10px; border-radius: var(--r-sm);
  background:none; border:none; color:#aaa; font-family: var(--sans);
  font-size:12px; font-weight:500; cursor:pointer;
  transition: all var(--t); white-space:nowrap;
}
.tool-btn:hover { background:#2a2a2a; color:#fff; }
.tool-btn svg { width:14px; height:14px; flex-shrink:0; }

.toolbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
.status-dot { width:7px; height:7px; border-radius:50%; background:#555; flex-shrink:0; transition: background .3s; }
.status-dot.live { background:#22c55e; box-shadow:0 0 6px #22c55e88; }
.status-dot.saving { background:#f59e0b; }
.status-text { font-size:11px; color:#777; font-family: var(--mono); }

.btn-share {
  padding: 6px 14px; border-radius: var(--r-sm);
  background: var(--accent); color:#fff; border:none;
  font-family: var(--sans); font-size:12px; font-weight:500;
  cursor:pointer; transition: all var(--t);
}
.btn-share:hover { background:#c0481e; }

/* Viewer badge */
.viewer-badge {
  display:flex; align-items:center; gap:6px;
  padding:5px 12px; border-radius:20px;
  background:#22c55e18; border:1px solid #22c55e44;
  font-size:11px; color:#22c55e; font-family: var(--mono);
}

/* ── LAYOUT ── */
.canvas-wrap {
  margin-top: var(--toolbar-h);
  min-height: calc(100vh - var(--toolbar-h));
  max-width: 860px;
  margin-left: auto; margin-right: auto;
  padding: 40px 24px 120px;
}

/* ── SESSÃO HEADER ── */
.canvas-header {
  margin-bottom: 40px;
  padding-bottom: 28px;
  border-bottom: 2px solid var(--border);
}
.canvas-title-input {
  width:100%; border:none; outline:none;
  font-family: var(--serif); font-size:36px; font-weight:600;
  color: var(--text); background:transparent; line-height:1.2;
  letter-spacing:-.5px;
}
.canvas-title-input::placeholder { color: var(--border); }
.canvas-meta {
  display:flex; align-items:center; gap:14px; margin-top:12px; flex-wrap:wrap;
}
.canvas-meta-chip {
  font-family: var(--mono); font-size:11px; color: var(--text-3);
  background: var(--border-soft); padding:3px 10px; border-radius:20px;
}

/* ── BLOCKS ── */
#blocks-container { display:flex; flex-direction:column; gap:6px; }

.block-wrapper {
  position:relative; display:flex; gap:0;
  border-radius: var(--r);
  transition: all var(--t);
}
.block-wrapper:hover .block-controls { opacity:1; }
.block-wrapper.dragging { opacity:.4; }
.block-wrapper.drag-over { outline: 2px solid var(--accent); outline-offset:2px; }

/* Drag handle */
.block-drag {
  display:flex; align-items:center; justify-content:center;
  width:24px; flex-shrink:0; color: var(--text-3);
  cursor:grab; opacity:0; transition:opacity var(--t);
  font-size:14px; padding-top:10px;
}
.block-wrapper:hover .block-drag { opacity:1; }
.block-drag:active { cursor:grabbing; }

/* Block controls (type selector + delete) */
.block-controls {
  position:absolute; left:-36px; top:6px;
  display:flex; flex-direction:column; gap:2px;
  opacity:0; transition:opacity var(--t);
}
.block-ctrl-btn {
  width:24px; height:24px; border-radius:4px;
  background: var(--surface); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color: var(--text-2); font-size:11px;
  box-shadow: var(--shadow); transition: all var(--t);
}
.block-ctrl-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-light); }

/* Block inner */
.block-inner { flex:1; min-width:0; }

/* ── BLOCK TYPES ── */

/* Paragraph */
.block-p {
  width:100%; border:none; outline:none; background:transparent;
  font-family: var(--sans); font-size:15px; line-height:1.8;
  color: var(--text); resize:none; overflow:hidden; min-height:28px;
  padding: 4px 0;
}
.block-p::placeholder { color: var(--border); }

/* Heading 1 */
.block-h1 {
  width:100%; border:none; outline:none; background:transparent;
  font-family: var(--serif); font-size:28px; font-weight:600;
  color: var(--text); resize:none; overflow:hidden;
  line-height:1.25; letter-spacing:-.3px; min-height:36px; padding:4px 0;
}
.block-h1::placeholder { color: var(--border); }

/* Heading 2 */
.block-h2 {
  width:100%; border:none; outline:none; background:transparent;
  font-family: var(--sans); font-size:20px; font-weight:600;
  color: var(--text); resize:none; overflow:hidden;
  line-height:1.35; min-height:28px; padding:4px 0;
}
.block-h2::placeholder { color: var(--border); }

/* Callout */
.block-callout-wrap {
  display:flex; gap:12px; align-items:flex-start;
  padding:14px 16px; border-radius: var(--r);
  background: var(--accent-bg); border-left:3px solid var(--accent);
  margin: 2px 0;
}
.block-callout-emoji { font-size:18px; flex-shrink:0; line-height:1.5; }
.block-callout {
  flex:1; border:none; outline:none; background:transparent;
  font-family: var(--sans); font-size:14px; line-height:1.7;
  color: var(--text); resize:none; overflow:hidden; min-height:24px;
}
.block-callout::placeholder { color: var(--accent-light); }

/* Quote */
.block-quote-wrap {
  padding: 10px 20px; border-left: 3px solid var(--border);
  margin: 2px 0;
}
.block-quote {
  width:100%; border:none; outline:none; background:transparent;
  font-family: var(--serif); font-size:16px; font-style:italic;
  color: var(--text-2); resize:none; overflow:hidden; min-height:26px; line-height:1.7;
}
.block-quote::placeholder { color: var(--border); }

/* Code */
.block-code-wrap {
  background:#1A1916; border-radius: var(--r);
  padding:16px 20px; margin:2px 0; position:relative;
}
.block-code-lang {
  position:absolute; top:10px; right:12px;
  font-family: var(--mono); font-size:10px; color:#555;
}
.block-code {
  width:100%; border:none; outline:none; background:transparent;
  font-family: var(--mono); font-size:13px; line-height:1.7;
  color:#86EFAC; resize:none; overflow:hidden; min-height:22px;
}

/* Divider */
.block-divider { height:1px; background: var(--border); margin:14px 0; border:none; }

/* Bullet */
.block-bullet-wrap { display:flex; gap:10px; align-items:flex-start; padding:2px 0; }
.block-bullet-dot {
  width:6px; height:6px; border-radius:50%; background: var(--accent);
  flex-shrink:0; margin-top:9px;
}
.block-bullet {
  flex:1; border:none; outline:none; background:transparent;
  font-family: var(--sans); font-size:15px; line-height:1.8;
  color: var(--text); resize:none; overflow:hidden; min-height:28px;
}
.block-bullet::placeholder { color: var(--border); }

/* Numbered */
.block-numbered-wrap { display:flex; gap:10px; align-items:flex-start; padding:2px 0; }
.block-numbered-num {
  font-family: var(--mono); font-size:12px; color: var(--accent);
  flex-shrink:0; min-width:20px; margin-top:5px; font-weight:500;
}
.block-numbered {
  flex:1; border:none; outline:none; background:transparent;
  font-family: var(--sans); font-size:15px; line-height:1.8;
  color: var(--text); resize:none; overflow:hidden; min-height:28px;
}
.block-numbered::placeholder { color: var(--border); }

/* Highlight box */
.block-highlight-wrap {
  padding:16px 20px; border-radius: var(--r); margin:2px 0;
}
.block-highlight-wrap.green { background: var(--green-bg); border-left:3px solid var(--green); }
.block-highlight-wrap.blue  { background: var(--blue-bg);  border-left:3px solid var(--blue); }
.block-highlight-wrap.amber { background: var(--amber-bg); border-left:3px solid var(--amber); }
.block-highlight-wrap.purple{ background: var(--purple-bg);border-left:3px solid var(--purple); }
.block-highlight {
  width:100%; border:none; outline:none; background:transparent;
  font-family: var(--sans); font-size:14px; line-height:1.75;
  color: var(--text); resize:none; overflow:hidden; min-height:24px;
}
.block-highlight::placeholder { color: var(--text-3); }

/* Image / embed */
.block-image-wrap {
  border:2px dashed var(--border); border-radius: var(--r);
  padding:32px; text-align:center; cursor:pointer;
  transition: all var(--t); background: var(--border-soft);
  margin:2px 0;
}
.block-image-wrap:hover { border-color: var(--accent); background: var(--accent-bg); }
.block-image-wrap img { max-width:100%; border-radius: var(--r-sm); }
.block-image-url {
  width:100%; border:1px solid var(--border); outline:none;
  font-family: var(--mono); font-size:12px; color: var(--text);
  background: var(--surface); border-radius: var(--r-sm);
  padding:8px 12px; margin-top:10px;
}
.block-image-url:focus { border-color: var(--accent); }
.block-image-placeholder { color: var(--text-3); font-size:13px; }
.block-image-placeholder svg { display:block; margin:0 auto 8px; opacity:.4; }

/* Add block button */
.add-block-btn {
  display:flex; align-items:center; gap:8px;
  padding:8px 12px; border-radius: var(--r-sm);
  background:none; border:1px dashed transparent;
  color: var(--text-3); font-family: var(--sans); font-size:13px;
  cursor:pointer; transition: all var(--t); width:100%;
  margin-top:4px;
}
.add-block-btn:hover { border-color: var(--border); color: var(--text-2); background: var(--border-soft); }
.add-block-btn svg { width:14px; height:14px; }

/* Block type picker popup */
.type-picker {
  position:fixed; background: var(--surface); border:1px solid var(--border);
  border-radius: var(--r); box-shadow: var(--shadow-lg);
  padding:6px; width:220px; z-index:500;
  display:none; flex-direction:column; gap:1px;
  animation: fadeIn .12s ease;
}
.type-picker.open { display:flex; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

.type-picker-item {
  display:flex; align-items:center; gap:10px;
  padding:7px 10px; border-radius: var(--r-sm);
  cursor:pointer; transition:background var(--t);
  border:none; background:none; font-family: var(--sans);
  font-size:13px; color: var(--text); width:100%; text-align:left;
}
.type-picker-item:hover { background: var(--accent-bg); color: var(--accent); }
.type-picker-item-icon { width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.type-picker-item-label { font-weight:500; }
.type-picker-item-desc { font-size:11px; color: var(--text-3); margin-left:auto; }
.type-picker-sep { height:1px; background: var(--border-soft); margin:3px 0; }

/* ── VIEWER MODE (aluno) ── */
body.viewer-mode .block-drag { display:none !important; }
body.viewer-mode .block-controls { display:none !important; }
body.viewer-mode .add-block-btn { display:none !important; }
body.viewer-mode textarea,
body.viewer-mode input[type="text"],
body.viewer-mode input[type="url"] { pointer-events:none; cursor:default; }
body.viewer-mode .canvas-title-input { pointer-events:none; cursor:default; }
body.viewer-mode .tool-group { display:none !important; }

/* ── REALTIME CURSOR (quem está editando) ── */
.live-indicator {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background: var(--text); color:#fff; font-family: var(--mono);
  font-size:11px; padding:7px 16px; border-radius:20px;
  display:none; align-items:center; gap:8px;
  box-shadow: var(--shadow-lg); z-index:300;
}
.live-indicator.show { display:flex; }
.live-dot { width:7px; height:7px; border-radius:50%; background:#22c55e; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Realtime update flash */
@keyframes blockFlash {
  0% { background: #22c55e18; }
  100% { background: transparent; }
}
.block-wrapper.just-updated { animation: blockFlash 1.2s ease; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius:3px; }

/* Empty state */
.empty-hint {
  text-align:center; padding:60px 20px; color: var(--text-3);
  font-size:14px; pointer-events:none;
}
.empty-hint strong { display:block; font-size:24px; margin-bottom:8px; color: var(--border); }
</style>
</head>

<script>
// ── CONFIG ──
const SUPA_URL = 'https://dtvnoqmavqoftqyurtyv.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0dm5vcW1hdnFvZnRxeXVydHl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzkxNzMsImV4cCI6MjA5MTk1NTE3M30.-u_di6GZcn9B2jCMzN59fVEvGFmlQ5lU5AVvck3xRc4';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── STATE ──
const params   = new URLSearchParams(location.search);
const sessaoId = params.get('sessao');
const isViewer = params.get('view') === '1'; // aluno abre com ?view=1

let blocks     = [];      // array de {id, type, content, meta}
let saveTimer  = null;
let canvasRow  = null;    // linha atual no banco
let sessaoInfo = null;
let isDirty    = false;
let pickTarget = null;    // bloco que ativou o type picker
let dragSrc    = null;

// Contador de numeração para numbered lists
let numberedCounters = {};

// ── INIT ──
document.addEventListener('DOMContentLoaded', async () => {
  if(!sessaoId){ showError('Nenhuma sessão informada. Use ?sessao=ID'); return; }

  if(isViewer){
    document.body.classList.add('viewer-mode');
    document.getElementById('viewer-badge').style.display = 'flex';
  } else {
    document.getElementById('tool-group').style.display = 'flex';
    document.getElementById('tb-sep').style.display = '';
    document.getElementById('btn-share').style.display = '';
    document.getElementById('main-add-btn').style.display = '';
  }

  await loadCanvas();
  subscribeRealtime();
  document.addEventListener('click', hideTypePicker);
});

// ── LOAD ──
async function loadCanvas(){
  setStatus('loading','Carregando…');
  try {
    // Sessão info
    const { data: sess } = await sb.from('mentoria_sessoes')
      .select('*, mentoria_alunos(nome)')
      .eq('id', sessaoId).single();
    if(sess){
      sessaoInfo = sess;
      const nomeSessao = sess.titulo || `Sessão ${sess.numero}`;
      const nomeAluno  = sess.mentoria_alunos?.nome || '';
      document.getElementById('tb-sessao').textContent = `${nomeSessao}${nomeAluno ? ' · ' + nomeAluno : ''}`;
      document.title = `${nomeSessao} — Canvas SellerHub`;

      // Meta info
      const chips = [];
      if(sess.data) chips.push(`📅 ${fmtData(sess.data)}`);
      if(sess.hora) chips.push(`🕐 ${sess.hora}`);
      chips.push(`🎓 ${nomeAluno}`);
      document.getElementById('canvas-meta').innerHTML = chips
        .map(c => `<span class="canvas-meta-chip">${c}</span>`).join('');
    }

    // Canvas data
    const { data: canvas } = await sb.from('canvas_sessoes')
      .select('*').eq('sessao_id', sessaoId).single();

    if(canvas){
      canvasRow = canvas;
      const title = canvas.blocks.find ? null : null; // título vem do campo separado
      blocks = Array.isArray(canvas.blocks) ? canvas.blocks : [];
      // título fica no primeiro bloco tipo 'title' ou num campo separado
      if(canvas.title) document.getElementById('canvas-title').value = canvas.title;
    } else {
      // Criar linha vazia
      const { data: newRow } = await sb.from('canvas_sessoes').insert({
        sessao_id: sessaoId,
        aluno_id: sessaoInfo?.aluno_id || null,
        blocks: [],
        title: sessaoInfo?.titulo || ''
      }).select().single();
      canvasRow = newRow;
      document.getElementById('canvas-title').value = sessaoInfo?.titulo || '';
    }

    renderAll();
    setStatus('live','Ao vivo');
  } catch(e){
    console.error(e);
    setStatus('off','Erro ao carregar');
  }
}

// ── REALTIME SUBSCRIBE ──
function subscribeRealtime(){
  const channel = sb.channel(`canvas:${sessaoId}`)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'canvas_sessoes',
      filter: `sessao_id=eq.${sessaoId}`
    }, payload => {
      // Ignora updates que vieram deste próprio cliente (evita loop)
      if(isViewer || payload.new.updated_by !== (isViewer ? 'admin' : 'mentorado')){
        applyRemoteUpdate(payload.new);
      }
    })
    .subscribe(status => {
      if(status === 'SUBSCRIBED') setStatus('live','Ao vivo');
      if(status === 'CLOSED')     setStatus('off','Desconectado');
    });
}

function applyRemoteUpdate(remote){
  // Atualiza blocos sem destruir foco local
  const remoteBlocks = Array.isArray(remote.blocks) ? remote.blocks : [];
  const remoteTitle  = remote.title || '';

  // Título
  const titleEl = document.getElementById('canvas-title');
  if(document.activeElement !== titleEl)
    titleEl.value = remoteTitle;

  // Blocos: atualiza só os que mudaram
  const focused = document.activeElement;
  const focusedBlockId = focused?.closest('[data-block-id]')?.dataset?.blockId;

  remoteBlocks.forEach((rb, idx) => {
    const existing = blocks.find(b => b.id === rb.id);
    if(!existing || JSON.stringify(existing) !== JSON.stringify(rb)){
      // Flash visual
      const wrapper = document.querySelector(`[data-block-id="${rb.id}"]`);
      if(wrapper){
        wrapper.classList.remove('just-updated');
        void wrapper.offsetWidth;
        wrapper.classList.add('just-updated');
      }
    }
  });

  blocks = remoteBlocks;
  if(canvasRow) canvasRow.title = remoteTitle;

  // Re-renderiza somente se não está editando um bloco
  if(!focusedBlockId || !remoteBlocks.find(b => b.id === focusedBlockId)){
    renderAll();
  } else {
    // Renderiza tudo exceto o bloco em foco
    renderAll(focusedBlockId);
  }

  showLive(remote.updated_by === 'admin' ? 'Mentor editou' : 'Aluno editou');
}

function showLive(msg){
  const el = document.getElementById('live-indicator');
  document.getElementById('live-text').textContent = msg;
  el.classList.add('show');
  clearTimeout(showLive._t);
  showLive._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── RENDER ──
function renderAll(skipBlockId = null){
  const container = document.getElementById('blocks-container');
  const emptyHint = document.getElementById('empty-hint');

  // Numeração de listas
  numberedCounters = {};
  let numIdx = 0;

  const html = blocks.map((b, idx) => {
    if(b.type === 'numbered') numIdx++;
    else numIdx = 0;
    return buildBlockHTML(b, idx, numIdx);
  }).join('');

  container.innerHTML = html;
  emptyHint.style.display = blocks.length === 0 && !isViewer ? 'block' : 'none';

  // Re-attach events
  container.querySelectorAll('textarea, input[type="text"], input[type="url"]').forEach(el => {
    if(isViewer){ el.readOnly = true; return; }
    el.addEventListener('input', () => {
      autoResize(el);
      onBlockInput(el);
    });
    el.addEventListener('keydown', e => onBlockKeydown(e, el));
    autoResize(el);
  });

  // Drag & drop
  if(!isViewer) setupDragDrop();
}

function buildBlockHTML(b, idx, numIdx){
  const controls = isViewer ? '' : `
    <div class="block-controls">
      <button class="block-ctrl-btn" onclick="openTypePicker('${b.id}',event)" title="Mudar tipo">⊞</button>
      <button class="block-ctrl-btn" onclick="deleteBlock('${b.id}')" title="Excluir">✕</button>
    </div>
  `;
  const drag = isViewer ? '' : `<div class="block-drag" draggable="true" data-drag="${b.id}">⠿</div>`;

  let inner = '';
  switch(b.type){
    case 'h1':
      inner = `<textarea class="block-h1" data-id="${b.id}" data-field="content" placeholder="Título…" rows="1">${esc(b.content)}</textarea>`;
      break;
    case 'h2':
      inner = `<textarea class="block-h2" data-id="${b.id}" data-field="content" placeholder="Subtítulo…" rows="1">${esc(b.content)}</textarea>`;
      break;
    case 'p':
      inner = `<textarea class="block-p" data-id="${b.id}" data-field="content" placeholder="Escreva algo…" rows="1">${esc(b.content)}</textarea>`;
      break;
    case 'callout':
      inner = `<div class="block-callout-wrap">
        <div class="block-callout-emoji">${b.meta?.emoji || '💡'}</div>
        <textarea class="block-callout" data-id="${b.id}" data-field="content" placeholder="Ponto de atenção…" rows="1">${esc(b.content)}</textarea>
      </div>`;
      break;
    case 'quote':
      inner = `<div class="block-quote-wrap">
        <textarea class="block-quote" data-id="${b.id}" data-field="content" placeholder="Citação…" rows="1">${esc(b.content)}</textarea>
      </div>`;
      break;
    case 'bullet':
      inner = `<div class="block-bullet-wrap">
        <div class="block-bullet-dot"></div>
        <textarea class="block-bullet" data-id="${b.id}" data-field="content" placeholder="Item…" rows="1">${esc(b.content)}</textarea>
      </div>`;
      break;
    case 'numbered':
      inner = `<div class="block-numbered-wrap">
        <div class="block-numbered-num">${numIdx}.</div>
        <textarea class="block-numbered" data-id="${b.id}" data-field="content" placeholder="Item…" rows="1">${esc(b.content)}</textarea>
      </div>`;
      break;
    case 'code':
      inner = `<div class="block-code-wrap">
        <div class="block-code-lang">código</div>
        <textarea class="block-code" data-id="${b.id}" data-field="content" placeholder="// código aqui…" rows="1" spellcheck="false">${esc(b.content)}</textarea>
      </div>`;
      break;
    case 'divider':
      inner = `<hr class="block-divider">`;
      break;
    case 'highlight-green':
    case 'highlight-blue':
    case 'highlight-amber':
    case 'highlight-purple': {
      const color = b.type.split('-')[1];
      inner = `<div class="block-highlight-wrap ${color}">
        <textarea class="block-highlight" data-id="${b.id}" data-field="content" placeholder="Ponto importante…" rows="1">${esc(b.content)}</textarea>
      </div>`;
      break;
    }
    case 'image':
      if(b.content && b.content.startsWith('http')){
        inner = `<div class="block-image-wrap" style="padding:8px;cursor:default;border-style:solid">
          <img src="${esc(b.content)}" alt="imagem">
          ${!isViewer ? `<input type="url" class="block-image-url" data-id="${b.id}" data-field="content" value="${esc(b.content)}" placeholder="URL da imagem…">` : ''}
        </div>`;
      } else {
        inner = `<div class="block-image-wrap">
          <svg class="block-image-placeholder" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
          <div class="block-image-placeholder">Cole uma URL de imagem abaixo</div>
          ${!isViewer ? `<input type="url" class="block-image-url" data-id="${b.id}" data-field="content" value="${esc(b.content)}" placeholder="https://…">` : ''}
        </div>`;
      }
      break;
    default:
      inner = `<textarea class="block-p" data-id="${b.id}" data-field="content" rows="1">${esc(b.content)}</textarea>`;
  }

  return `<div class="block-wrapper" data-block-id="${b.id}" data-idx="${idx}">
    ${controls}
    ${drag}
    <div class="block-inner">${inner}</div>
  </div>`;
}

// ── BLOCK OPERATIONS ──
function genId(){ return Math.random().toString(36).slice(2,10); }

function addBlock(type, afterId = null){
  const block = { id: genId(), type, content: '', meta: {} };
  if(afterId){
    const idx = blocks.findIndex(b => b.id === afterId);
    blocks.splice(idx+1, 0, block);
  } else {
    blocks.push(block);
  }
  renderAll();
  scheduleSave();
  // Foca no novo bloco
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${block.id}"]`);
    if(el){ el.focus(); autoResize(el); }
  }, 30);
}

function deleteBlock(id){
  blocks = blocks.filter(b => b.id !== id);
  renderAll();
  scheduleSave();
}

function onBlockInput(el){
  const id    = el.dataset.id;
  const field = el.dataset.field || 'content';
  const b     = blocks.find(x => x.id === id);
  if(!b) return;
  b[field] = el.value;
  isDirty = true;
  scheduleSave();
}

function onTitleInput(){
  isDirty = true;
  scheduleSave();
}

function onBlockKeydown(e, el){
  const id = el.dataset.id;
  // Enter → cria novo bloco do mesmo tipo (exceto title/h1/h2 que cria p)
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    const b = blocks.find(x => x.id === id);
    const nextType = ['h1','h2','code'].includes(b?.type) ? 'p' : b?.type || 'p';
    addBlock(nextType, id);
  }
  // Backspace em bloco vazio → exclui e foca anterior
  if(e.key === 'Backspace' && el.value === ''){
    e.preventDefault();
    const idx = blocks.findIndex(x => x.id === id);
    deleteBlock(id);
    if(idx > 0){
      setTimeout(() => {
        const prev = document.querySelector(`[data-id="${blocks[idx-1]?.id}"]`);
        if(prev){ prev.focus(); const len = prev.value.length; prev.setSelectionRange(len,len); }
      }, 20);
    }
  }
}

// ── TYPE PICKER ──
let pickerForId = null;
function openTypePicker(blockId, e){
  e.stopPropagation();
  pickerForId = blockId;
  const picker = document.getElementById('type-picker');
  picker.classList.add('open');
  // Posiciona próximo ao click
  const x = Math.min(e.clientX, window.innerWidth - 230);
  const y = Math.min(e.clientY + 4, window.innerHeight - 420);
  picker.style.left = x + 'px';
  picker.style.top  = y + 'px';
}
function hideTypePicker(e){
  if(!e.target.closest('#type-picker') && !e.target.closest('.block-ctrl-btn') && !e.target.closest('.add-block-btn')){
    document.getElementById('type-picker').classList.remove('open');
    pickerForId = null;
  }
}
function pickType(type){
  document.getElementById('type-picker').classList.remove('open');
  if(pickerForId === null){
    // Add new at end
    addBlock(type);
  } else {
    // Change type of existing block
    const b = blocks.find(x => x.id === pickerForId);
    if(b){ b.type = type; renderAll(); scheduleSave(); }
  }
  pickerForId = null;
}

// ── SAVE ──
function scheduleSave(){
  setStatus('saving','Salvando…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCanvas, 800);
}

async function saveCanvas(){
  if(!canvasRow) return;
  const title = document.getElementById('canvas-title').value;
  const who = isViewer ? 'mentorado' : 'admin';
  try {
    const { error } = await sb.from('canvas_sessoes')
      .update({ blocks, title, updated_by: who })
      .eq('id', canvasRow.id);
    if(error) throw error;
    setStatus('live','Salvo ✓');
    isDirty = false;
  } catch(e){
    console.error('save error', e);
    setStatus('off','Erro ao salvar');
  }
}

// ── STATUS ──
function setStatus(state, msg){
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  dot.className = 'status-dot' + (state === 'live' ? ' live' : state === 'saving' ? ' saving' : '');
  text.textContent = msg;
}

// ── DRAG & DROP ──
function setupDragDrop(){
  const container = document.getElementById('blocks-container');
  container.querySelectorAll('[data-drag]').forEach(handle => {
    handle.addEventListener('dragstart', e => {
      dragSrc = handle.dataset.drag;
      handle.closest('.block-wrapper').classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    handle.addEventListener('dragend', () => {
      document.querySelectorAll('.block-wrapper').forEach(w => {
        w.classList.remove('dragging','drag-over');
      });
    });
  });
  container.querySelectorAll('.block-wrapper').forEach(wrapper => {
    wrapper.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      container.querySelectorAll('.block-wrapper').forEach(w => w.classList.remove('drag-over'));
      if(wrapper.dataset.blockId !== dragSrc) wrapper.classList.add('drag-over');
    });
    wrapper.addEventListener('drop', e => {
      e.preventDefault();
      const targetId = wrapper.dataset.blockId;
      if(!dragSrc || dragSrc === targetId) return;
      const srcIdx  = blocks.findIndex(b => b.id === dragSrc);
      const tgtIdx  = blocks.findIndex(b => b.id === targetId);
      const [moved] = blocks.splice(srcIdx, 1);
      blocks.splice(tgtIdx, 0, moved);
      renderAll();
      scheduleSave();
    });
  });
}

// ── UTILS ──
function autoResize(el){
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtData(d){ if(!d)return''; const[y,m,dia]=d.split('-'); return`${dia}/${m}/${y}`; }

function copyViewLink(){
  const url = location.href.split('?')[0] + `?sessao=${sessaoId}&view=1`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('btn-share');
    btn.textContent = 'Link copiado ✓';
    setTimeout(() => btn.textContent = 'Copiar link do aluno', 2000);
  });
}

function showError(msg){
  document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#888;font-size:15px">${msg}</div>`;
}

// Salva antes de fechar
window.addEventListener('beforeunload', e => {
  if(isDirty){ saveCanvas(); e.preventDefault(); }
});
</script>
